# Base de datos MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/parking_manager?useSSL=false&serverTimezone=Europe/Madrid
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=8080

# Clave secreta para firmar los JWT (mínimo 256 bits para HS256)
jwt.secret=MiClaveSecretaSuperSeguraParaFirmarTokensJWT2026ParkingManager
jwt.expiration=86400000